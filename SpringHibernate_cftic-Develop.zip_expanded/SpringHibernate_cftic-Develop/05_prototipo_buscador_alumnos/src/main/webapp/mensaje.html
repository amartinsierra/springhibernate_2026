<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Lista de Alumnos</title>
</head>
<body>
    <div align="center">
        <h1>API RESPONSE</h1>
    </div>

    <div th:if="${mensaje != null}">
        <h2 th:text="${mensaje}" align="center"></h2>
    </div>

    <div th:if="${lista != null}">
        <table border="1" align="center">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Curso</th>
                    <th>Email</th>
                    <th>Nota</th>
                    <th>Acción</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="it : ${lista}">
                    <td th:text="${it.nombre}"></td>
                    <td th:text="${it.curso}"></td>
                    <td th:text="${it.email}"></td>
                    <td th:text="${it.nota}"></td>
                    <td>
                        <form th:action="@{/delAlumno}" method="post">
                            <input type="hidden" name="idAlumno" th:value="${it.idAlumno}" />
                            <button type="submit">Eliminar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
	<div  align="center">
	<h2><a th:href="goMenu"/>volver</h2>
	</div>
</body>
</html>
