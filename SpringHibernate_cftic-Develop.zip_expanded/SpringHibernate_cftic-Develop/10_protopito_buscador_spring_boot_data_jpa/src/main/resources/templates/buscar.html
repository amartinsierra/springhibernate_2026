<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buscar por Temática</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #0C1C2B);
}

.form-container {
    background: #ffffff;
    padding: 40px 35px;
    width: 380px;
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
}

.form-container h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #333;
}

.input-group {
    position: relative;
    margin-bottom: 30px;
}

.input-group input {
    width: 100%;
    padding: 14px 12px;
    border: 2px solid #ddd;
    border-radius: 10px;
    outline: none;
    font-size: 14px;
    transition: 0.3s ease;
    background: transparent;
}

.input-group label {
    position: absolute;
    top: 14px;
    left: 14px;
    color: #777;
    font-size: 14px;
    pointer-events: none;
    transition: 0.3s ease;
    background: #fff;
    padding: 0 5px;
}

.input-group input:focus {
    border-color: #764ba2;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    top: -8px;
    left: 10px;
    font-size: 11px;
    color: #764ba2;
}

.btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: #764ba2;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s ease;
    margin-bottom: 12px;
}

.btn:hover {
    background: #5a3780;
}

.btn-secondary {
    background: #e0e0e0;
    color: #333;
}

.btn-secondary:hover {
    background: #c9c9c9;
}
</style>
</head>

<body>

<div class="form-container">

    <h2>Buscar por Temática</h2>

    <form th:action="@{/goFindItems}" method="get">
        <div class="input-group">
            <input type="text" name="tematica" required placeholder=" ">
            <label>Temática</label>
        </div>
        <button type="submit" class="btn">Buscar</button>
    </form>

    <form th:action="@{/goMenu}" method="get">
        <button type="submit" class="btn btn-secondary">Volver</button>
    </form>

</div>

</body>
</html>
