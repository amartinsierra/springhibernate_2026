<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>API Response</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #333;
            margin-top: 40px;
        }

        h2 {
            color: #555;
            margin: 20px 0;
        }

        a {
            text-decoration: none;
            color: white;
            background-color: #007bff;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #0056b3;
        }

        .mensaje {
            background-color: #e0ffe0;
            border: 1px solid #00b300;
            padding: 15px 25px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>API RESPONSE</h1>

    <div th:if="${mensaje != null}" class="mensaje">
        <h2 th:text="${mensaje}"></h2>
    </div>

    <div>
        <h2>
            <a th:href="@{/goMenu}">Volver</a>
        </h2>
    </div>
</body>
</html>
