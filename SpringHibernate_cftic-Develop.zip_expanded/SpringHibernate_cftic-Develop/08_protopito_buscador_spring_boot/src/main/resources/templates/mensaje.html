<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Listado de Items</title>

<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        margin: 0;
        padding: 0;
    }

    .container {
        width: 80%;
        margin: 40px auto;
        text-align: center;
    }

    .card {
        background-color: white;
        border-radius: 12px;
        padding: 20px;
        margin: 20px auto;
        width: 60%;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        transition: transform 0.2s ease-in-out;
    }

    .card:hover {
        transform: scale(1.03);
    }

    h1 {
        color: #2e59d9;
        margin-bottom: 10px;
    }

    h2 {
        color: white;
    }

    .label-title {
        font-weight: bold;
        color: #4e73df;
    }

    .message {
        margin-top: 30px;
        font-size: 20px;
        font-weight: bold;
        color: #fff;
    }

    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background-color: #f6c23e;
        color: #000;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: background 0.3s;
    }

    .btn:hover {
        background-color: #dda20a;
        color: white;
    }

    hr {
        border: none;
        height: 1px;
        background-color: #eee;
        margin-top: 15px;
    }
</style>

</head>
<body>

<div class="container">

    <div th:each="it : ${lista}" class="card">
        <h1>Item</h1>

        <p><span class="label-title">URL:</span> 
            <span th:text="${it.url}"></span>
        </p>

        <p><span class="label-title">Temática:</span> 
            <span th:text="${it.tematica}"></span>
        </p>

        <p><span class="label-title">Descripción:</span> 
            <span th:text="${it.descripcion}"></span>
        </p>
    </div>

    <div class="message">
        <h2>API RESPONSE</h2>
        <p th:text="${mensaje}"></p>
    </div>

    <a th:href="@{/goMenu}" class="btn">Volver al menú</a>

</div>

</body>
</html>
